<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Электронное портфолио учителя</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #4c6fff, #9b7bff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
        }
        .card {
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.18);
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 26px;
        }
        p.subtitle {
            margin: 0 0 28px;
            font-size: 15px;
            color: #666;
        }
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #4c6fff, #5dd0ff);
            box-shadow: 0 6px 14px rgba(76,111,255,0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        .btn:nth-child(2) {
            background: linear-gradient(135deg, #ff7b6b, #ffb067);
            box-shadow: 0 6px 14px rgba(255,123,107,0.35);
        }
        .btn:nth-child(3) {
            background: linear-gradient(135deg, #3ccf91, #7ae1c0);
            box-shadow: 0 6px 14px rgba(60,207,145,0.35);
        }
        .btn:nth-child(4) {
            background: linear-gradient(135deg, #8b5cff, #c889ff);
            box-shadow: 0 6px 14px rgba(139,92,255,0.35);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.22);
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(0,0,0,0.16);
        }
        @media (max-width: 480px) {
            .card {
                margin: 15px;
                padding: 28px 22px;
            }
            .buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Электронное портфолио учителя</h1>
    <p class="subtitle">Электронное портфолио Леонтьевой А. В.</p>
    <p class="subtitle">Выберите раздел, чтобы перейти к материалам</p>

    <div class="buttons">
        <a class="btn" href="https://disk.yandex.ru/d/h-0K4nnVQq4wqw/%D0%98%D0%93%D0%A0%D0%9E%D0%A2%D0%95%D0%9A%D0%90" target="_blank">Игротека</a>
        <a class="btn" href="https://disk.yandex.ru/d/h-0K4nnVQq4wqw/%D0%9F%D0%A0%D0%98%D0%9C%D0%95%D0%A0%D0%AB%20%D0%9E%D0%A4%D0%9E%D0%A0%D0%9C%D0%9B%D0%95%D0%9D%D0%98%D0%AF" target="_blank">Раздаточные материалы</a>
        <a class="btn" href="https://disk.yandex.ru/d/h-0K4nnVQq4wqw/%D0%A1%D0%A6%D0%95%D0%9D%D0%90%D0%A0%D0%98%D0%98" target="_blank">Сценарии маероприятий</a>
        <a class="btn" href="https://disk.yandex.ru/d/h-0K4nnVQq4wqw/%D0%9F%D0%9B%D0%90%D0%9D%D0%A1%D0%95%D0%A2%D0%9A%D0%98" target="_blank">План-сетки</a>
    </div>
</div>

</body>
</html>
